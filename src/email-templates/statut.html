<!doctype html>
<html lang="fr">
  <body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;color:#111827;">
    <div style="max-width:620px;margin:24px auto;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
      <div style="background:#2563eb;color:#ffffff;padding:18px 24px;font-size:18px;font-weight:700;">
        {{app_name}}
      </div>
      <div style="padding:24px;line-height:1.6;">
        <p style="margin:0 0 12px 0;">Bonjour {{client_name}},</p>
        <p style="margin:0 0 12px 0;">Le statut de votre réparation <strong>{{repair_ref}}</strong> a été mis à jour.</p>
        <p style="margin:0 0 8px 0;"><strong>Nouveau statut:</strong> {{status_label}}</p>
        <p style="margin:0 0 14px 0;"><strong>Commentaire:</strong> {{comment}}</p>
        <p style="margin:18px 0 0 0;">
          <a href="{{tracking_url}}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;padding:10px 14px;border-radius:8px;">Voir le suivi</a>
        </p>
      </div>
      <div style="padding:14px 24px;background:#f9fafb;color:#6b7280;font-size:12px;">
        Cet e-mail a été envoyé automatiquement par {{app_name}}.
      </div>
    </div>
  </body>
</html>
